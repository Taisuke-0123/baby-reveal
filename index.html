<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<!-- スマホ最優先：拡大縮小を抑えてアプリのように表示 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#fbe3ea">
<title>赤ちゃんからメッセージ</title>

<style>
/* =========================================================
   ★★★ 色設定（ここを変えると全体の色が変わります）★★★
   パステルピンク基調 ＋ 白 ＋ ゴールドのアクセント
   ※ 男の子にする場合はピンク系をブルー系に置き換えてください
      例）--balloon: #9fd3f2; --pink-deep: #2f6fb0; など
   ========================================================= */
:root{
  --bg-top:      #fff6f9;   /* 背景（上）うすいピンク */
  --bg-bottom:   #fbe3ea;   /* 背景（下）パステルピンク */
  --bg-party-1:  #ffd9e6;   /* 発表後の華やかな背景１ */
  --bg-party-2:  #fff3cf;   /* 発表後の華やかな背景２（ゴールド寄り） */
  /* 風船は「パステル虹色」です。色の帯を変えたい場合は下の .balloon の
     linear-gradient（虹色の帯）を編集してください。性別が分からない中立色です。 */
  --balloon-lo:  #b9a6dd;   /* 風船の結び目・ひもの色（やわらかい紫） */
  --pink-deep:   #d6457f;   /* 文字・アクセントの濃いピンク */
  --pink-soft:   #f48fb1;   /* やわらかいピンク */
  --gold:        #d9b25a;   /* ゴールド */
  --gold-light:  #f0d896;   /* 明るいゴールド */
  --white:       #ffffff;   /* 白 */
  --text:        #6b4453;   /* 本文の文字色（やさしいブラウンピンク） */
  --confetti-1:  #f7a8c4;   /* 紙吹雪の色たち */
  --confetti-2:  #ffd3e2;
  --confetti-3:  #ffffff;
  --confetti-4:  #f0d896;
  --confetti-5:  #ec7fa6;
}

/* ---------- 基本リセット ---------- */
*{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ height:100%; }
body{
  font-family:"Hiragino Maru Gothic ProN","Hiragino Sans","Yu Gothic","Noto Sans JP","Segoe UI",system-ui,sans-serif;
  color:var(--text);
  background:linear-gradient(180deg,var(--bg-top) 0%,var(--bg-bottom) 100%);
  overflow:hidden;
  position:fixed;            /* スマホでのバウンドスクロール防止 */
  inset:0;
  -webkit-font-smoothing:antialiased;
  text-align:center;
}

/* 発表後：背景を華やかに切り替える */
body.party{
  background:
    radial-gradient(120% 80% at 50% 0%, var(--bg-party-2) 0%, transparent 55%),
    linear-gradient(180deg, var(--bg-party-1) 0%, var(--bg-bottom) 100%);
  transition:background 1.2s ease;
}

/* ---------- 画面（ステージ）共通 ---------- */
.stage{
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:8vh 24px calc(8vh + env(safe-area-inset-bottom));
  gap:18px;
  opacity:0; pointer-events:none;
  transition:opacity .6s ease;
}
.stage.show{ opacity:1; pointer-events:auto; }

/* ========================================================= */
/*  ① オープニング画面                                       */
/* ========================================================= */
#screen-open{ justify-content:space-between; padding-top:11vh; padding-bottom:9vh; }

.open-head{ display:flex; flex-direction:column; gap:10px; }
.open-title{
  font-size:clamp(26px,7.6vw,40px);
  font-weight:800; line-height:1.4; color:var(--pink-deep);
  letter-spacing:.02em;
}
.open-sub{
  font-size:clamp(16px,4.4vw,22px);
  font-weight:600; line-height:1.6; color:var(--text);
}
.open-deco{ font-size:clamp(20px,5.5vw,26px); color:var(--gold); letter-spacing:.5em; padding-left:.5em; }

/* 風船をタップしてください */
.tap-hint{
  display:inline-flex; align-items:center; gap:8px;
  font-size:clamp(17px,4.8vw,22px); font-weight:700; color:var(--pink-deep);
  background:var(--white);
  padding:14px 26px; border-radius:999px;
  box-shadow:0 8px 22px rgba(214,69,127,.18);
  animation:hintPulse 1.8s ease-in-out infinite;
}
.tap-hint .finger{ font-size:1.2em; animation:tapMove 1.4s ease-in-out infinite; }
@keyframes hintPulse{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-6px); } }
@keyframes tapMove{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(5px);} }

/* ---------- ② 風船 ---------- */
.balloon-wrap{
  position:relative;
  cursor:pointer; user-select:none;
  animation:floaty 4.5s ease-in-out infinite;   /* ふわふわ浮く */
  will-change:transform;
}
.balloon-wrap.wobble{ animation:wobble .55s ease; }  /* タップで少し揺れる */
.balloon-wrap.pop{ animation:popOut .5s ease forwards; }

.balloon{
  width:min(58vw,230px); height:min(70vw,280px);
  /* ↓ パステル虹色の帯。色や順番を変えると風船の見た目が変わります */
  background:
    radial-gradient(circle at 34% 26%, rgba(255,255,255,.65) 0%, rgba(255,255,255,0) 40%),
    linear-gradient(140deg,
      #ff9aa2 0%,    /* 赤 */
      #ffb38a 18%,   /* オレンジ */
      #ffe39a 36%,   /* 黄 */
      #b8e9c5 54%,   /* 緑 */
      #a7d3f5 72%,   /* 青 */
      #c4b1ec 100%   /* 紫 */
    );
  border-radius:50% 50% 50% 50% / 46% 46% 54% 54%;
  position:relative;
  box-shadow:inset -10px -16px 26px rgba(0,0,0,.12), 0 18px 30px rgba(120,90,160,.28);
}
/* ツヤ */
.balloon::before{
  content:""; position:absolute; top:14%; left:22%;
  width:26%; height:30%; border-radius:50%;
  background:radial-gradient(circle at 40% 40%, rgba(255,255,255,.9), rgba(255,255,255,0) 70%);
}
/* 結び目 */
.balloon::after{
  content:""; position:absolute; bottom:-12px; left:50%; transform:translateX(-50%);
  border-left:11px solid transparent; border-right:11px solid transparent;
  border-top:16px solid var(--balloon-lo);
}
/* ひも */
.string{
  position:absolute; left:50%; top:100%; width:2px; height:90px;
  background:linear-gradient(var(--balloon-lo),rgba(185,166,221,.2));
  transform:translateX(-50%);
}
.balloon-tip{
  position:absolute; top:42%; left:50%; transform:translate(-50%,-50%);
  font-size:clamp(40px,13vw,64px); font-weight:900; color:#fff;
  text-shadow:0 3px 8px rgba(0,0,0,.18);   /* 性別が分からない「?」マーク */
}

@keyframes floaty{
  0%,100%{ transform:translateY(0) rotate(-1.5deg); }
  50%{ transform:translateY(-22px) rotate(1.5deg); }
}
@keyframes wobble{
  0%,100%{ transform:rotate(0); }
  20%{ transform:rotate(-9deg) scale(1.02); }
  40%{ transform:rotate(7deg); }
  60%{ transform:rotate(-5deg); }
  80%{ transform:rotate(3deg); }
}
@keyframes popOut{
  0%{ transform:scale(1); opacity:1; }
  35%{ transform:scale(1.18); opacity:1; }
  100%{ transform:scale(.1); opacity:0; }
}

/* ========================================================= */
/*  ③ カウントダウン画面                                     */
/* ========================================================= */
#screen-count{ background:transparent; }
.count-num{
  font-size:min(56vw,300px); font-weight:900; line-height:1;
  color:var(--pink-deep);
  text-shadow:0 10px 30px rgba(214,69,127,.25);
  animation:countPop .9s ease;
}
@keyframes countPop{
  0%{ transform:scale(.3); opacity:0; }
  35%{ transform:scale(1.1); opacity:1; }
  70%{ transform:scale(1); opacity:1; }
  100%{ transform:scale(.85); opacity:0; }
}

/* ========================================================= */
/*  ④⑤⑥⑦ 発表・メッセージ・エンディング画面                 */
/* ========================================================= */
#screen-reveal{ gap:6px; padding-top:9vh; }

.reveal-title{
  font-size:clamp(34px,9.5vw,58px); font-weight:900; line-height:1.3;
  color:var(--pink-deep);
  text-shadow:0 6px 18px rgba(214,69,127,.22);
  opacity:0; transform:scale(.6);
}
.reveal-title.in{ animation:bounceIn .9s cubic-bezier(.2,.9,.3,1.3) forwards; }
@keyframes bounceIn{
  0%{ opacity:0; transform:scale(.4); }
  60%{ opacity:1; transform:scale(1.12); }
  100%{ opacity:1; transform:scale(1); }
}

.divider{
  width:0; height:2px; margin:14px auto 6px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.divider.in{ animation:lineGrow .9s ease .3s forwards; }
@keyframes lineGrow{ to{ width:min(70%,300px); } }

.message{
  display:flex; flex-direction:column; gap:14px;
  max-width:560px; margin-top:6px;
}
.message p{
  font-size:clamp(18px,5vw,23px); font-weight:600; line-height:1.7;
  opacity:0; transform:translateY(14px);
}
.message p.due{
  color:var(--pink-deep); font-weight:800;
  font-size:clamp(19px,5.4vw,25px);
}
.message p.in{ animation:fadeUp .8s ease forwards; }
@keyframes fadeUp{ to{ opacity:1; transform:translateY(0); } }

/* ⑦ Baby Girl（おしゃれな筆記体） */
.babyword{
  margin-top:30px; opacity:0; transform:translateY(18px);
  font-family:"Snell Roundhand","Apple Chancery","Segoe Script","Brush Script MT",cursive;
  font-size:clamp(48px,16vw,92px); font-weight:600; line-height:1;
  background:linear-gradient(120deg,var(--pink-deep),var(--pink-soft) 50%,var(--gold) 100%);
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent; color:var(--pink-deep);
  filter:drop-shadow(0 6px 14px rgba(214,69,127,.18));
  letter-spacing:.01em;
}
.babyword.in{ animation:fadeUp 1.1s ease forwards; }
.babyword small{
  display:block; margin-top:6px;
  font-family:inherit; font-size:.42em;
  letter-spacing:.45em; padding-left:.45em;
  -webkit-text-fill-color:var(--gold); color:var(--gold);
}

/* もう一度見るボタン */
.replay{
  margin-top:34px; opacity:0;
  border:none; background:var(--white); color:var(--pink-deep);
  font-size:16px; font-weight:700; font-family:inherit;
  padding:12px 26px; border-radius:999px; cursor:pointer;
  box-shadow:0 6px 16px rgba(214,69,127,.16);
}
.replay.in{ animation:fadeUp .8s ease forwards; }
.replay:active{ transform:scale(.96); }

/* ========================================================= */
/*  エフェクト用レイヤー（紙吹雪・ハート・キラキラ）          */
/* ========================================================= */
#fx{ position:absolute; inset:0; overflow:hidden; pointer-events:none; z-index:5; }

.confetti{
  position:absolute; top:-24px; width:12px; height:18px; border-radius:2px;
  opacity:.95; will-change:transform;
  animation:fall linear forwards;
}
@keyframes fall{
  0%{ transform:translateY(0) rotateZ(0) rotateY(0); }
  100%{ transform:translateY(108vh) rotateZ(720deg) rotateY(540deg); }
}

.heart{ position:absolute; bottom:-40px; font-size:26px; opacity:0; will-change:transform; animation:rise ease-in forwards; }
@keyframes rise{
  0%{ transform:translateY(0) scale(.6); opacity:0; }
  12%{ opacity:1; }
  100%{ transform:translateY(-115vh) scale(1.1); opacity:0; }
}

.sparkle{ position:absolute; font-size:20px; opacity:0; animation:twinkle ease-in-out forwards; }
@keyframes twinkle{
  0%{ transform:scale(0) rotate(0); opacity:0; }
  40%{ transform:scale(1.2) rotate(40deg); opacity:1; }
  100%{ transform:scale(0) rotate(90deg); opacity:0; }
}

.burst{ position:absolute; width:14px; height:14px; border-radius:50%; will-change:transform; }

/* ---------- 動きを減らす設定の端末への配慮 ---------- */
@media (prefers-reduced-motion: reduce){
  .balloon-wrap{ animation:none; }
  .tap-hint{ animation:none; }
}
</style>
</head>

<body>

<!-- ① オープニング ＋ ② 風船 -->
<section class="stage show" id="screen-open">
  <div class="open-head">
    <div class="open-title">おじいちゃん、おばあちゃんへ</div>
    <div class="open-sub">赤ちゃんからメッセージがあります</div>
    <div class="open-deco">✦</div>
  </div>

  <!-- 風船（タップで開始） -->
  <div class="balloon-wrap" id="balloon" role="button" tabindex="0" aria-label="風船をタップ">
    <div class="balloon"><span class="balloon-tip">?</span></div>
    <div class="string"></div>
  </div>

  <div class="tap-hint"><span class="finger">👆</span>風船をタップしてください</div>
</section>

<!-- ③ カウントダウン -->
<section class="stage" id="screen-count">
  <div class="count-num" id="count-num"></div>
</section>

<!-- ④⑤⑥⑦ 発表 → メッセージ → エンディング -->
<section class="stage" id="screen-reveal">
  <h1 class="reveal-title" id="reveal-title"></h1>
  <div class="divider" id="divider"></div>
  <div class="message" id="message"></div>
  <div class="babyword" id="babyword"></div>
  <button class="replay" id="replay" type="button">もう一度見る</button>
</section>

<!-- エフェクト描画先 -->
<div id="fx"></div>

<script>
/* =========================================================
   ★★★ 編集はここだけでOK（発表内容の設定）★★★
   ========================================================= */
const CONFIG = {

  /* --- 性別 --- */
  /* 発表タイトル（絵文字も自由に変更できます） */
  revealText: "女の子です！🎀",
  /* エンディングの英字（"Baby Girl" / "Baby Boy" など） */
  babyWord:   "Baby Girl",

  /* --- 出産予定日 --- */
  dueDate: "2026年8月26日 出産予定です",

  /* --- メッセージ（行を足したり減らしたりできます） --- */
  messages: [
    "元気に会える日を楽しみにしていてね",
    "これからも温かく見守ってください"
  ]
  /* ※ 出産予定日（dueDate）はメッセージの1行目と2行目の間に表示されます */
};
/* ====== 設定はここまで。以下は演出の仕組みです ====== */


/* ---- 要素の取得 ---- */
const body      = document.body;
const fx        = document.getElementById('fx');
const sOpen     = document.getElementById('screen-open');
const sCount    = document.getElementById('screen-count');
const sReveal   = document.getElementById('screen-reveal');
const balloon   = document.getElementById('balloon');
const countNum  = document.getElementById('count-num');
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

let started = false;

/* ---- 画面の切り替え ---- */
function show(el){ el.classList.add('show'); }
function hide(el){ el.classList.remove('show'); }

/* ---- 風船タップで演出開始 ---- */
function start(){
  if(started) return;
  started = true;

  /* ② タップで少し揺れる */
  balloon.classList.add('wobble');
  setTimeout(()=>{ balloon.classList.remove('wobble'); runCountdown(); }, 650);
}
balloon.addEventListener('click', start);
balloon.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' ') start(); });

/* ---- ③ カウントダウン 3 → 2 → 1 ---- */
function runCountdown(){
  hide(sOpen);
  setTimeout(()=>{ show(sCount); step(3); }, 500);

  function step(n){
    if(n<1){ reveal(); return; }
    countNum.textContent = n;
    /* アニメをやり直すための再描画 */
    countNum.style.animation='none'; countNum.offsetHeight; countNum.style.animation='';
    setTimeout(()=>step(n-1), 950);
  }
}

/* ---- ④ 風船が割れて発表へ ---- */
function reveal(){
  hide(sCount);

  /* 風船が割れる演出 → 中央でバースト */
  balloon.classList.add('pop');
  const r = balloon.getBoundingClientRect();
  burstAt(r.left + r.width/2, r.top + r.height/2);

  /* 背景を華やかに */
  body.classList.add('party');

  /* ピンクの紙吹雪・キラキラ・ハート */
  launchConfetti();
  launchSparkles();
  launchHearts();

  /* ⑤⑥⑦ 文字を順番に表示 */
  setTimeout(showReveal, 350);
}

/* ---- ⑤ 性別発表 → ⑥ メッセージ → ⑦ エンディング ---- */
function showReveal(){
  show(sReveal);

  const title   = document.getElementById('reveal-title');
  const divider = document.getElementById('divider');
  const msgBox  = document.getElementById('message');
  const babyEl  = document.getElementById('babyword');
  const replay  = document.getElementById('replay');

  /* ⑤ 性別発表 */
  title.textContent = CONFIG.revealText;
  requestAnimationFrame(()=> title.classList.add('in'));
  divider.classList.add('in');

  /* ⑥ メッセージ（1行目 → 出産予定日 → 残りの行）を組み立て */
  msgBox.innerHTML = '';
  const lines = [];
  if(CONFIG.messages[0]) lines.push({t:CONFIG.messages[0], due:false});
  lines.push({t:CONFIG.dueDate, due:true});
  CONFIG.messages.slice(1).forEach(m=> lines.push({t:m, due:false}));

  let delay = 700;
  lines.forEach(line=>{
    const p = document.createElement('p');
    p.textContent = line.t;
    if(line.due) p.className = 'due';
    msgBox.appendChild(p);
    setTimeout(()=> p.classList.add('in'), delay);
    delay += 650;
  });

  /* ⑦ Baby Girl（エンディング） */
  babyEl.innerHTML = CONFIG.babyWord + '<small>♡</small>';
  setTimeout(()=> babyEl.classList.add('in'), delay + 350);
  setTimeout(()=> replay.classList.add('in'),  delay + 900);

  /* 余韻のハートを少しずつ追加 */
  if(!reduceMotion){
    let count=0;
    const t=setInterval(()=>{ launchHearts(4); if(++count>4) clearInterval(t); }, 1200);
  }
}

/* =========================================================
   エフェクト（紙吹雪・ハート・キラキラ・バースト）
   ========================================================= */
const COLORS = ['--confetti-1','--confetti-2','--confetti-3','--confetti-4','--confetti-5']
  .map(v=> getComputedStyle(document.documentElement).getPropertyValue(v).trim());

function launchConfetti(){
  const count = reduceMotion ? 30 : 90;
  for(let i=0;i<count;i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100 + 'vw';
    c.style.background = COLORS[i % COLORS.length];
    const w = 8 + Math.random()*8;
    c.style.width  = w + 'px';
    c.style.height = (w*1.4) + 'px';
    if(Math.random()<0.4) c.style.borderRadius = '50%';
    c.style.animationDuration = (2.6 + Math.random()*2.4) + 's';
    c.style.animationDelay    = (Math.random()*1.2) + 's';
    fx.appendChild(c);
    setTimeout(()=>c.remove(), 6500);
  }
}

function launchHearts(n){
  const count = n || (reduceMotion ? 6 : 16);
  const hearts = ['💗','💕','🎀','💝','🤍'];
  for(let i=0;i<count;i++){
    const h = document.createElement('div');
    h.className = 'heart';
    h.textContent = hearts[Math.floor(Math.random()*hearts.length)];
    h.style.left = (5 + Math.random()*90) + 'vw';
    h.style.fontSize = (20 + Math.random()*22) + 'px';
    h.style.animationDuration = (3.2 + Math.random()*2.2) + 's';
    h.style.animationDelay    = (Math.random()*0.8) + 's';
    fx.appendChild(h);
    setTimeout(()=>h.remove(), 6000);
  }
}

function launchSparkles(){
  const count = reduceMotion ? 10 : 26;
  const stars = ['✨','⭐','🌟','✦'];
  for(let i=0;i<count;i++){
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = stars[Math.floor(Math.random()*stars.length)];
    s.style.left = Math.random()*100 + 'vw';
    s.style.top  = Math.random()*85 + 'vh';
    s.style.fontSize = (14 + Math.random()*18) + 'px';
    s.style.animationDuration = (1.2 + Math.random()*1.4) + 's';
    s.style.animationDelay    = (Math.random()*2.2) + 's';
    fx.appendChild(s);
    setTimeout(()=>s.remove(), 4200);
  }
}

/* 風船が割れた位置からの飛び散り */
function burstAt(x,y){
  const count = reduceMotion ? 14 : 34;
  for(let i=0;i<count;i++){
    const p = document.createElement('div');
    p.className = 'burst';
    p.style.left = x+'px'; p.style.top = y+'px';
    const sz = 7 + Math.random()*9;
    p.style.width = sz+'px'; p.style.height = sz+'px';
    p.style.background = COLORS[i % COLORS.length];
    if(Math.random()<0.4) p.style.borderRadius='2px';
    fx.appendChild(p);

    const ang = Math.random()*Math.PI*2;
    const dist = 80 + Math.random()*170;
    const dx = Math.cos(ang)*dist;
    const dy = Math.sin(ang)*dist - 40;
    p.animate(
      [
        { transform:'translate(0,0) scale(1)', opacity:1 },
        { transform:`translate(${dx}px,${dy}px) scale(.4)`, opacity:0 }
      ],
      { duration:700 + Math.random()*500, easing:'cubic-bezier(.2,.7,.3,1)', fill:'forwards' }
    );
    setTimeout(()=>p.remove(), 1300);
  }
}

/* ---- もう一度見る（最初に戻る） ---- */
document.getElementById('replay').addEventListener('click', ()=> location.reload());
</script>
</body>
</html>
